name: Deploy to GitHub Pages

on:
  # main ブランチへの push でデプロイ
  push:
    branches:
      - main
  # Actions タブからの手動実行も許可
  workflow_dispatch:

# GITHUB_TOKEN に Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ。実行中のデプロイはキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        # next.config.ts の output: 'export' で out/ を生成
        run: npm run build

      - name: Disable Jekyll
        # GitHub Pages の Jekyll 処理を無効化し、_next ディレクトリを保持する
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
